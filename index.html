  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

utton onclick=\"{{ toWelcome }}\" style=\"{{ backBtnStyle }}\">‹ Back<\u002Fbutton>\n          <div style=\"flex:1;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; max-width:340px; margin:0 auto; width:100%;\">\n          <img src=\"15e92a87-4cdc-4a22-b264-573274209391\" style=\"width:96px; height:96px; object-fit:cover; border-radius:50%; border:4px solid var(--frame,#fff);\">\n          <h2 style=\"font-family:'Gochi Hand',cursive; font-size:38px; color:var(--ink,#6e4a3a); margin:10px 0 2px;\">Parents only ♥<\u002Fh2>\n          <p style=\"font-family:'Fredoka',sans-serif; color:var(--muted,#bb8a86); font-size:16px; margin:0 0 14px;\">Enter the PIN to open the gallery<\u002Fp>\n\n          <div style=\"display:flex; gap:12px; height:24px; align-items:center; margin-bottom:6px;\">\n            <sc-for list=\"{{ gateDots }}\" as=\"d\" hint-placeholder-count=\"4\"><div style=\"{{ d.style }}\"><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ gateError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'Fredoka',sans-serif; color:#e23b5a; font-weight:600; font-size:15px; height:20px;\">Wrong PIN — try again<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; margin-top:10px;\">\n            <sc-for list=\"{{ pinPad }}\" as=\"p\" hint-placeholder-count=\"12\"><button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-active=\"transform:scale(.94);\">{{ p.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== GALLERY (parents) ===================== -->\n    <sc-if value=\"{{ isGallery }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Parents gallery\" style=\"flex:1; display:flex; flex-direction:column; padding:28px 30px 22px;\">\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <button onclick=\"{{ toWelcome }}\" style=\"{{ backBtnStyle }}\">‹ Back<\u002Fbutton>\n          <div style=\"flex:1; text-align:center;\"><div style=\"font-family:'Gochi Hand',cursive; font-size:34px; color:var(--ink,#6e4a3a);\">Parents' Gallery<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:64px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:'Fredoka',sans-serif; color:var(--muted,#bb8a86); font-size:14px; text-align:center; margin:6px 0 14px;\">{{ galleryNote }}<\u002Fp>\n\n        <sc-if value=\"{{ galleryEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;\">\n            <img src=\"15e92a87-4cdc-4a22-b264-573274209391\" style=\"width:130px; height:130px; object-fit:cover; border-radius:50%; border:5px solid var(--frame,#fff); opacity:.8;\">\n            <div style=\"font-family:'Fredoka',sans-serif; color:var(--muted,#bb8a86); font-size:18px;\">No photos saved yet — go snap one! ♥<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ galleryHas }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; gap:10px; margin-bottom:14px;\">\n            <button onclick=\"{{ downloadAll }}\" style=\"flex:1; font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:#fff; background:var(--accent-d,#e87da3); border:none; padding:13px; border-radius:999px; cursor:pointer;\">⤓ Download all<\u002Fbutton>\n            <button onclick=\"{{ clearGallery }}\" style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:var(--muted,#bb8a86); background:var(--cream,#fdeede); border:2px solid var(--line,#f6c9d9); padding:13px 22px; border-radius:999px; cursor:pointer;\">Clear<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; align-content:start;\">{{ galleryEls }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== THANKS ===================== -->\n    <sc-if value=\"{{ isThanks }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Thank you\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:48px; position:relative; overflow:hidden;\">\n        <div style=\"position:absolute; inset:0; pointer-events:none;\">\n          <sc-for list=\"{{ hearts }}\" as=\"h\" hint-placeholder-count=\"0\">\n            <div style=\"{{ h.style }}\">♥<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <img src=\"15e92a87-4cdc-4a22-b264-573274209391\" style=\"width:190px; height:190px; object-fit:cover; border-radius:32px; border:6px solid var(--frame,#fff); box-shadow:0 18px 40px rgba(150,90,110,.25); --r:4deg; animation:capyfloat 5s ease-in-out infinite;\">\n        <h2 style=\"font-family:'Gochi Hand',cursive; font-size:60px; color:var(--ink,#6e4a3a); margin:26px 0 6px;\">Thank you! ♥<\u002Fh2>\n        <p style=\"font-family:'Fredoka',sans-serif; color:var(--muted,#bb8a86); font-size:20px; max-width:420px; margin:0;\">Your photo &amp; wish mean the world to Rebekah &amp; Peter. Stay cozy like a capy!<\u002Fp>\n        <button onclick=\"{{ restart }}\" style=\"margin-top:38px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:24px; color:#fff; background:var(--accent-d,#e87da3); border:none; padding:20px 50px; border-radius:999px; cursor:pointer; box-shadow:0 12px 0 var(--accent,#f3a4c1);\" style-active=\"transform:translateY(7px); box-shadow:0 5px 0 var(--accent,#f3a4c1);\">Take another ♥<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <canvas ref=\"{{ canvasRef }}\" style=\"display:none;\"><\u002Fcanvas>\n\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:60; background:var(--ink,#6e4a3a); color:#fff; font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px; padding:14px 26px; border-radius:999px; box-shadow:0 12px 30px rgba(110,74,58,.4); animation:pop .4s ease;\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      variant:'pink', screen:'welcome', layout:'single',\n      shots:[], count:null, capturing:false, posing:false, flash:false, camError:false,\n      filter:'none', frame:'hearts', camErrName:'', camStarting:false,\n      email:'', sent:false, toast:'', composed:null, emailStatus:'',\n      gallery:[], gatePin:'', gateError:false,\n      wishStep:'choose', wishKind:null, wishMsg:'', wishUrl:null, recSecs:0, wishName:''\n    };\n    this.videoRef = React.createRef();\n    this.canvasRef = React.createRef();\n    this.wishVideoRef = React.createRef();\n    this._prevScreen='welcome'; this._prevWishStep='choose';\n    this._sessionId='s'+Date.now();\n  }\n\n  // ===== PASTE YOUR GOOGLE APPS SCRIPT WEB-APP URL BETWEEN THE QUOTES BELOW =====\n  backendUrl(){ return \"https://script.google.com/macros/s/AKfycbzJ1ncaSaq3fCzvWeWo_GYDP9R8YHPygiV21aPEljKKcmRErl-lYyYQf0O37jawgymSVQ/exec\"; }\n  // ===== Parents' Gallery PIN — change the digits below to your own =====\n  galleryPin(){ return \"2468\"; }\n  // =============================================================================\n\n  componentDidMount(){\n    const RES=(window.__resources)||{};\n    const mk=(src)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.src=src; return i; };\n    this.imgs={ heart:mk(RES.capyHeart||'assets/capy-heart.png'), env:mk(RES.capyEnvelope||'assets/capy-envelope.png'), pair:mk(RES.capyPair||'assets/capy-pair.png') };\n    this.loadGallery();\n    if(this.state.screen==='camera') this.startCamera();\n  }\n  componentWillUnmount(){ this.stopCamera(); this.stopStream(this.wish); if(this.timer) clearInterval(this.timer); }\n\n  componentDidUpdate(){\n    const screen=this.state.screen;\n    if(this._prevScreen!=='camera' && screen==='camera') this.startCamera();\n    if(this._prevScreen==='camera' && screen!=='camera') this.stopCamera();\n    if(this._prevWishStep!=='recording' && this.state.wishStep==='recording' && this.state.wishKind==='video'){\n      const v=this.wishVideoRef.current; if(v && this.wish){ v.srcObject=this.wish; v.muted=true; v.play().catch(()=>{}); }\n    }\n    this._prevScreen=screen; this._prevWishStep=this.state.wishStep;\n  }\n\n  stopStream(s){ if(s){ s.getTracks().forEach(t=>t.stop()); } }\n  stopCamera(){ this.stopStream(this.booth); this.booth=null; }\n\n  async startCamera(){\n    if(this.state.camStarting) return;\n    this.setState({ camStarting:true });\n    try{\n      let s;\n      try{ s = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false }); }\n      catch(_){ s = await navigator.mediaDevices.getUserMedia({ video:true, audio:false }); }\n      this.booth = s;\n      const v=this.videoRef.current;\n      if(v){ v.srcObject=s; v.muted=true; await v.play().catch(()=>{}); }\n      this.setState({ camError:false, camErrName:'', camStarting:false });\n    }catch(e){ this.setState({ camError:true, camErrName:(e&&e.name)||'Error', camStarting:false }); }\n  }\n  retryCamera(){ this.startCamera(); }\n  openStandalone(){ try{ window.open(window.location.href, '_blank'); }catch(e){} }\n\n  sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }\n  shotCount(){ return this.state.layout==='single'?1 : this.state.layout==='strip'?3 : 4; }\n\n  async beginCapture(){\n    if(this.state.capturing || this.state.camError) return;\n    const n=this.shotCount();\n    this.setState({ capturing:true, shots:[], composed:null });\n    for(let i=0;i<n;i++){\n      if(i>0){ this.setState({ posing:true }); await this.sleep(900); this.setState({ posing:false }); }\n      for(let c=3;c>=1;c--){ this.setState({ count:c }); await this.sleep(850); }\n      this.setState({ count:null, flash:true }); await this.sleep(120);\n      this.snap(); this.setState({ flash:false }); await this.sleep(500);\n    }\n    this.setState({ capturing:false, screen:'preview' });\n    this.buildComposed();\n  }\n\n  snap(){\n    const v=this.videoRef.current, cv=this.canvasRef.current;\n    if(!v||!cv||!v.videoWidth){ return; }\n    const size=Math.min(v.videoWidth, v.videoHeight);\n    cv.width=size; cv.height=size;\n    const ctx=cv.getContext('2d');\n    const sx=(v.videoWidth-size)/2, sy=(v.videoHeight-size)/2;\n    ctx.save(); ctx.translate(size,0); ctx.scale(-1,1);\n    ctx.drawImage(v, sx,sy,size,size, 0,0,size,size); ctx.restore();\n    const url=cv.toDataURL('image/jpeg',0.92);\n    this.setState(s=>({ shots:[...s.shots, url] }));\n  }\n\n  // ===== composite the framed strip into a single flat image =====\n  loadImg(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; }); }\n  roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }\n  circle(ctx,cx,cy,r){ ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath(); }\n\n  async compose(){\n    const s=this.state; if(!s.shots.length) return null;\n    const T=this.theme(); const id=s.frame; const fr=this.framesDef(T)[id];\n    const CFG=({\n      hearts:{ bg:'#ffffff', stripe:false, border:T.accent, dash:false, stickers:[['heart','tl'],['env','tr']] },\n      stripes:{ bg:'#ffffff', stripe:true, border:T.accentD, dash:false, stickers:[['pair','tc']] },\n      mail:{ bg:T.cream, stripe:false, border:T.accentD, dash:true, stickers:[['env','br']] },\n      classic:{ bg:'#ffffff', stripe:false, border:T.line, dash:false, stickers:[] }\n    })[id] || { bg:'#fff', stripe:false, border:T.line, dash:false, stickers:[] };\n    try{ if(document.fonts && document.fonts.ready) await document.fonts.ready; }catch(e){}\n\n    const layout=s.layout, SC=2;\n    const pad=44*SC, gap=18*SC, bannerH=84*SC, capH=60*SC;\n    let cols,rows,photo;\n    if(layout==='single'){ cols=1; rows=1; photo=470*SC; }\n    else if(layout==='strip'){ cols=1; rows=3; photo=420*SC; }\n    else { cols=2; rows=2; photo=360*SC; }\n    const innerW=cols*photo+(cols-1)*gap;\n    const W=pad*2+innerW;\n    const photosH=rows*photo+(rows-1)*gap;\n    const H=pad+bannerH+photosH+capH+pad;\n\n    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;\n    const ctx=cv.getContext('2d');\n    if(CFG.stripe){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.fillStyle=T.cream; const sw=13*SC; for(let x=0;x<W;x+=sw*2){ ctx.fillRect(x+sw,0,sw,H); } }\n    else { ctx.fillStyle=CFG.bg; ctx.fillRect(0,0,W,H); }\n    ctx.lineWidth=4*SC; ctx.strokeStyle=CFG.border; if(CFG.dash) ctx.setLineDash([14*SC,10*SC]);\n    const bw=ctx.lineWidth; this.roundRect(ctx, bw, bw, W-bw*2, H-bw*2, 14*SC); ctx.stroke(); ctx.setLineDash([]);\n\n    ctx.textAlign='center'; ctx.textBaseline='middle';\n    ctx.fillStyle=T.accentD; let fs=34*SC; ctx.font=fs+\"px 'Gochi Hand', cursive\";\n    while(ctx.measureText(fr.banner).width > W-pad*1.3 && fs>16*SC){ fs-=2*SC; ctx.font=fs+\"px 'Gochi Hand', cursive\"; }\n    ctx.fillText(fr.banner, W/2, pad+bannerH/2);\n\n    const x0=pad, y0=pad+bannerH;\n    const shotImgs=await Promise.all(s.shots.map(u=>this.loadImg(u)));\n    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){\n      const idx=r*cols+c; const px=x0+c*(photo+gap), py=y0+r*(photo+gap);\n      this.roundRect(ctx,px,py,photo,photo,12*SC); ctx.save(); ctx.clip();\n      const im=shotImgs[idx];\n      if(im) ctx.drawImage(im,px,py,photo,photo); else { ctx.fillStyle=T.cream; ctx.fillRect(px,py,photo,photo); }\n      ctx.restore();\n      ctx.lineWidth=6*SC; ctx.strokeStyle=(id==='stripes')?'#fff':T.line; this.roundRect(ctx,px,py,photo,photo,12*SC); ctx.stroke();\n    }\n\n    ctx.fillStyle=T.muted; let cfs=24*SC; ctx.font=cfs+\"px 'Gochi Hand', cursive\";\n    while(ctx.measureText(fr.caption).width > W-pad*1.3 && cfs>14*SC){ cfs-=2*SC; ctx.font=cfs+\"px 'Gochi Hand', cursive\"; }\n    ctx.fillText(fr.caption, W/2, pad+bannerH+photosH+capH/2);\n\n    for(const pair of (CFG.stickers||[])){\n      const key=pair[0], corner=pair[1]; const im=this.imgs&&this.imgs[key];\n      if(!im||!im.complete||!im.naturalWidth) continue;\n      const d=84*SC; let cx,cy;\n      if(corner==='tl'){ cx=pad+2*SC; cy=pad+bannerH-12*SC; }\n      else if(corner==='tr'){ cx=W-pad-d-2*SC; cy=pad+bannerH-12*SC; }\n      else if(corner==='tc'){ cx=W/2-d/2; cy=pad+bannerH-18*SC; }\n      else { cx=W-pad-d+6*SC; cy=H-pad-d+4*SC; }\n      ctx.save(); this.circle(ctx,cx+d/2,cy+d/2,d/2); ctx.clip(); ctx.drawImage(im,cx,cy,d,d); ctx.restore();\n      ctx.lineWidth=4*SC; ctx.strokeStyle='#fff'; this.circle(ctx,cx+d/2,cy+d/2,d/2); ctx.stroke();\n    }\n    return cv.toDataURL('image/jpeg',0.9);\n  }\n\n  async buildComposed(){\n    const url=await this.compose();\n    if(url){ this.setState({ composed:url }); this.saveToGallery(url); }\n    return url;\n  }\n\n  // ===== local on-device gallery (IndexedDB) =====\n  idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open('capybooth',1); r.onupgradeneeded=()=>{ try{ r.result.createObjectStore('photos',{keyPath:'id'}); }catch(e){} }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }\n  txDone(tx){ return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=()=>rej(tx.error); tx.onabort=()=>rej(tx.error); }); }\n  async saveToGallery(url){ try{ const db=await this.idb(); const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').put({ id:this._sessionId, ts:Date.now(), layout:this.state.layout, frame:this.state.frame, img:url }); await this.txDone(tx); this.loadGallery(); }catch(e){} }\n  async loadGallery(){ try{ const db=await this.idb(); const tx=db.transaction('photos','readonly'); const req=tx.objectStore('photos').getAll(); req.onsuccess=()=>{ const all=(req.result||[]).sort((a,b)=>b.ts-a.ts); this.setState({ gallery:all }); }; }catch(e){} }\n  async clearGallery(){ try{ const db=await this.idb(); const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').clear(); await this.txDone(tx); this.setState({ gallery:[] }); this.flash2('Gallery cleared'); }catch(e){} }\n\n  dl(url,name){ const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); }\n  downloadComposed(){ const u=this.state.composed; if(!u){ this.flash2('One sec — finishing your photo…'); this.buildComposed(); return; } this.dl(u,'capy-photo-'+Date.now()+'.jpg'); this.flash2('Saved to your device ♥'); this.uploadParents(); }\n  async downloadAll(){ for(const r of this.state.gallery){ this.dl(r.img,'capy-'+r.id+'.jpg'); await this.sleep(450); } }\n\n  // ===== Google Apps Script backend (Drive folder + email from Workspace) =====\n  async backendPost(payload){\n    const url=this.backendUrl();\n    if(!url) return { ok:false, reason:'not-configured' };\n    try{ await fetch(url, { method:'POST', mode:'no-cors', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body:JSON.stringify(payload) }); return { ok:true }; }\n    catch(e){ return { ok:false, reason:'network' }; }\n  }\n  async uploadParents(){\n    if(this._sessionUploaded || !this.backendUrl()) return;\n    if(!this.state.composed) await this.buildComposed();\n    const r=await this.backendPost({ action:'save', img:this.state.composed, layout:this.state.layout, frame:this.state.frame, sessionId:this._sessionId });\n    if(r.ok) this._sessionUploaded=true;\n  }\n\n  // navigation\n  toWelcome(){ this.setState({ screen:'welcome' }); }\n  toChoose(){ this.setState(
